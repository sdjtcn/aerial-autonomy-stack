name: aircraft-image amd64

on:
  workflow_call: {}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          sudo rm -rf /usr/local/share/boost &
          sudo rm -rf /usr/share/swift &
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" &
          wait
          sudo docker image prune --all --force
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Add swap space on /mnt
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo fallocate -l 10G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile

      - name: Check swap
        run: |
          free -h
          sudo swapon --show
          
      - name: Check disk space
        run: df -h

      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Clone external repos
        run: CLONE_ONLY=true ./scripts/sim_build.sh

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine Docker tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_NUMBER: ${{ github.event.number }}
          REF_NAME: ${{ github.ref_name }}
          REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" == "pull_request" ]; then
            echo "DOCKER_TAG=pr-${EVENT_NUMBER}" >> $GITHUB_ENV
          elif [ "$REF" == "refs/heads/main" ]; then
            echo "DOCKER_TAG=latest" >> $GITHUB_ENV
          else
            BRANCH_TAG=$(echo "$REF_NAME" | tr '/' '-')
            echo "DOCKER_TAG=${BRANCH_TAG}" >> $GITHUB_ENV
          fi

      - name: Build the aircraft
        run: docker buildx build --push -t ghcr.io/jacopopan/aircraft-image:${{ env.DOCKER_TAG }} -f ./scripts/docker/Dockerfile.aircraft .
